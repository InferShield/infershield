# Nginx Load Balancer Configuration
# Distributes traffic across multiple InferShield backend instances

events {
    worker_connections 1024;
}

http {
    upstream infershield_backend {
        # Round-robin load balancing (default)
        # No sticky sessions needed - sessions stored in Redis!
        server backend-1:5000;
        server backend-2:5000;
        
        # Health checks
        keepalive 32;
    }
    
    server {
        listen 80;
        server_name localhost;
        
        # Logging
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;
        
        # Health check endpoint (Nginx own health)
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        
        # Proxy all requests to backend cluster
        location / {
            proxy_pass http://infershield_backend;
            
            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Session ID preservation (important!)
            proxy_set_header X-Session-ID $http_x_session_id;
            
            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            
            # No keepalive upstream (let Redis handle state)
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
