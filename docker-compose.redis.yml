# Docker Compose - Multi-Instance Development Environment
# 
# This configuration sets up:
# - 1 Redis instance (shared session store)
# - 2 Backend instances (ports 5000, 5001)
# - 1 Nginx load balancer (port 8080)
#
# Usage:
#   docker-compose -f docker-compose.redis.yml up -d
#   docker-compose -f docker-compose.redis.yml logs -f
#   docker-compose -f docker-compose.redis.yml down

version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: infershield-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass infershield-dev-password
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - infershield-network

  backend-1:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
    container_name: infershield-backend-1
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - REDIS_URL=redis://:infershield-dev-password@redis:6379/0
      - USE_REDIS_SESSIONS=true
      - SESSION_TTL=3600
      - DATABASE_URL=postgresql://user:pass@db:5432/infershield
      - JWT_SECRET=dev-secret-change-in-production
      - LOG_LEVEL=info
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - infershield-network
    restart: unless-stopped

  backend-2:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
    container_name: infershield-backend-2
    ports:
      - "5001:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - REDIS_URL=redis://:infershield-dev-password@redis:6379/0
      - USE_REDIS_SESSIONS=true
      - SESSION_TTL=3600
      - DATABASE_URL=postgresql://user:pass@db:5432/infershield
      - JWT_SECRET=dev-secret-change-in-production
      - LOG_LEVEL=info
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - infershield-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: infershield-lb
    ports:
      - "8080:80"
    volumes:
      - ./nginx-lb.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-1
      - backend-2
    networks:
      - infershield-network
    restart: unless-stopped

volumes:
  redis-data:
    driver: local

networks:
  infershield-network:
    driver: bridge
